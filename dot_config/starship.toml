# ~/.config/starship.toml — a fast, legible, cross-shell prompt.
# Deliberately font-safe: it avoids Nerd Font private-use glyphs so it renders
# correctly in any modern monospace font. Install a Nerd Font for richer icons
# and you can add `symbol` glyphs back to taste. Docs: https://starship.rs/config/

add_newline = true
command_timeout = 800

format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$cmd_duration\
$line_break\
$character"""

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold blue"

[git_branch]
format = "[$branch]($style) "
style = "bold purple"

[git_status]
style = "bold red"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕"
untracked = "?${count}"
modified = "!${count}"
staged = "+${count}"
stashed = "*${count}"
deleted = "✘${count}"

[cmd_duration]
min_time = 2000
format = "took [$duration](bold yellow) "

[python]
format = "[py $version]($style) "
style = "yellow"

[nodejs]
format = "[node $version]($style) "
style = "green"

[rust]
format = "[rs $version]($style) "
style = "red"

[golang]
format = "[go $version]($style) "
style = "cyan"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"
