# Start numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Mouse support
set -g mouse on

# Sane split bindings (without overiding defaults)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Quick config reload
bind r source-file ~/.tmux.conf \; display "Reloaded"

# Longer scrollback
set -g history-limit 10000

# Reduce escape delay (helps with vim inside tmux)
set -sg escape-time 10

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# --- Modern quality-of-life additions ---
set -g renumber-windows on          # keep window numbers gapless after closing one
set -g focus-events on              # let vim/nvim react to terminal focus changes
set -g set-clipboard on             # integrate copy-mode with the system clipboard

# Vi keys in copy mode, with intuitive selection/yank bindings.
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
